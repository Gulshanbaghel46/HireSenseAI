<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - HireSense AI</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global CSS -->
    <link rel="stylesheet" href="/css/global.css">
    <style>
        .success-card {
            width: 100%;
            max-width: 450px;
            padding: 50px 40px;
            border-radius: var(--radius-lg);
            text-align: center;
        }
        .success-icon-container {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid var(--success);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: var(--success);
            margin-bottom: 25px;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounceIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
            70% {
                transform: scale(0.9);
                opacity: 0.9;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .success-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .success-msg {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 1rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="center-box">
        <div class="success-card glass-card animated">
            <div class="success-icon-container">
                <i class="fa-solid fa-check"></i>
            </div>
            <h1 class="success-title">Operation Successful</h1>
            <p class="success-msg" th:text="${message} ?: 'Your action has been completed successfully.'"></p>
            
            <a href="/users/login" class="btn btn-primary">
                Proceed to Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </a>
        </div>
    </div>

</body>
</html>
