<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HireSense AI</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global CSS -->
    <link rel="stylesheet" href="/css/global.css">
    <style>
        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: var(--radius-lg);
            text-align: center;
        }
        .logo-area {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 8px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            color: var(--primary);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(168, 85, 247, 0.2) 100%);
            width: 50px;
            height: 50px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-icon-wrapper {
            position: relative;
        }
        .input-icon-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .input-icon-wrapper input {
            padding-left: 44px;
        }
        .auth-footer {
            margin-top: 25px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .auth-footer a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="center-box">
        <div class="auth-card glass-card animated">
            <div class="logo-area">
                <span class="logo-icon"><i class="fa-solid fa-brain"></i></span>
                <span class="gradient-text">HireSense AI</span>
            </div>
            <p class="subtitle">Mock Interview & Skill Assessment</p>

            <form action="/users/loginForm" method="post">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="name@company.com" required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 25px;">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" id="btn-login" class="btn btn-primary">
                    Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="/users/register">Create Account</a>
            </div>
        </div>
    </div>

</body>
</html>
