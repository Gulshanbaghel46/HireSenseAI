<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume - HireSense AI</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global CSS -->
    <link rel="stylesheet" href="/css/global.css">
    <style>
        .upload-card {
            width: 100%;
            max-width: 520px;
            padding: 40px;
            border-radius: var(--radius-lg);
            text-align: center;
        }
        .upload-zone {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-md);
            padding: 40px 20px;
            margin: 25px 0;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }
        .upload-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 15px;
            transition: transform 0.2s;
        }
        .upload-zone:hover .upload-icon {
            transform: translateY(-5px);
        }
        .file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .file-info {
            display: none;
            margin-top: 15px;
            color: var(--success);
            font-weight: 600;
            font-size: 0.95rem;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="center-box">
        <div class="upload-card glass-card animated">
            <div style="text-align: left; margin-bottom: 25px;">
                <a href="/users/dashboard" class="btn btn-secondary btn-sm" style="width: auto; padding: 6px 12px; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 6px;">
                    <i class="fa-solid fa-arrow-left"></i> Dashboard
                </a>
            </div>

            <h1 class="gradient-text" style="font-size: 1.8rem; font-weight: 800; margin-bottom: 8px;">Upload Resume</h1>
            <p class="subtitle" style="margin-bottom: 15px;">Target Role: 
                <span class="badge badge-primary" th:if="${jobRole == 'java'}" style="text-transform: none;">Java Developer</span>
                <span class="badge badge-primary" th:if="${jobRole == 'ai'}" style="text-transform: none;">AI / ML Engineer</span>
                <span class="badge badge-primary" th:if="${jobRole == 'web'}" style="text-transform: none;">Web Developer</span>
                <span class="badge badge-primary" th:if="${jobRole == null or jobRole == ''}" style="text-transform: none;">General Profile</span>
            </p>

            <!-- Server Message Display -->
            <div class="alert-error" th:if="${message != null}">
                <i class="fa-solid fa-triangle-exclamation"></i> <span th:text="${message}"></span>
            </div>

            <form action="/users/uploadResume" method="post" enctype="multipart/form-data">
                <input type="hidden" name="jobRole" th:if="${jobRole != null}" th:value="${jobRole}">

                <div class="upload-zone" id="drop-zone">
                    <input type="file" name="file" id="file-selector" class="file-input" accept="application/pdf" required onchange="handleFileSelect(this)">
                    <div class="upload-icon">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                    </div>
                    <h3 style="font-size: 1.1rem; font-weight: 600; margin-bottom: 8px;">Drag & Drop your Resume</h3>
                    <p style="color: var(--text-muted); font-size: 0.85rem;">Only PDF format files are supported (Max size: 5MB)</p>
                    
                    <div class="file-info" id="file-info">
                        <i class="fa-solid fa-file-pdf"></i> <span id="file-name">filename.pdf</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top: 10px;">
                    Analyze Resume <i class="fa-solid fa-magnifying-glass-chart"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        function handleFileSelect(input) {
            const fileInfo = document.getElementById('file-info');
            const fileName = document.getElementById('file-name');
            const dropZone = document.getElementById('drop-zone');
            
            if (input.files && input.files[0]) {
                const file = input.files[0];
                fileName.textContent = file.name;
                fileInfo.style.display = 'flex';
                dropZone.style.borderColor = 'var(--success)';
            } else {
                fileInfo.style.display = 'none';
                dropZone.style.borderColor = 'rgba(255, 255, 255, 0.15)';
            }
        }

        // Drag events styling
        const dropZone = document.getElementById('drop-zone');
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, e => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, e => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            }, false);
        });
    </script>
</body>
</html>
