spring.application.name=HireSenseAI

# ==========================================================
# Database
# ==========================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hiresense_ai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================================
# JPA
# ==========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================================
# Server
# ==========================================================
server.port=${PORT:8081}

# ==========================================================
# File Upload
# ==========================================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

hiresense.uploads.dir=${UPLOADS_DIR:${user.home}/hiresenseai/uploads}

# ==========================================================
# Groq AI
# ==========================================================
groq.api.key=${GROQ_API_KEY:demo_key}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.model=${GROQ_MODEL:llama3-8b-8192}

# ==========================================================
# Email
# ==========================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# ==========================================================
# Features
# ==========================================================
hiresense.mail.enabled=${MAIL_ENABLED:false}
hiresense.emotion.enabled=${EMOTION_ENABLED:false}
hiresense.ai.evaluation.enabled=${AI_EVALUATION_ENABLED:true}